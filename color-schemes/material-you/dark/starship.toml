format = '[$user ]($style)'
disabled = false

[os]
style = "bg:primary fg:on_primary"
disabled = true 

[directory]
style = "bg:primary_container fg:on_primary_container"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

