"$schema" = 'https://starship.rs/config-schema.json'

# Enable the custom palette globally
palette = "colors"

format = """
[Óā∂](fg:primary)\
$os\
$username\
[Óāį](bg:primary_container fg:primary)\
$directory\
[Óāį](fg:primary_container bg:secondary)\
$git_branch\
$git_status\
[Óāį](fg:secondary bg:secondary_container)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$maven\
